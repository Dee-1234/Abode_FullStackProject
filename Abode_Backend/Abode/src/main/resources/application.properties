# ===============================
# 1. GENERAL APP SETTINGS
# ===============================
spring.application.name=Abode
server.port=8080

# ===============================
# 2. DATABASE (POSTGRESQL)
# ===============================
# Replace 'your_username' and 'your_password' with your local Postgres credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/abode_db
spring.datasource.username={YOUR_USERNAME}
spring.datasource.password={YOUR_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate logic
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# 3. SECURITY & JWT
# ===============================
# Secret key should be a long, random string (at least 256-bit for HS256)
abode.app.jwtSecret={SECRETKEY}
abode.app.jwtExpirationMs=86400000

# ===============================
# 4. ARTIFICIAL INTELLIGENCE (GEMINI)
# ===============================
# Get your key from https://aistudio.google.com/
gemini.api.key={YOUR_KEY}
gemini.api.url={YOUR_URL}

# ===============================
# 5. OPENFEIGN (For API Calls)
# ===============================
# Setting timeouts for the AI call so it doesn't hang the thread
spring.cloud.openfeign.client.config.geminiClient.connectTimeout=5000
spring.cloud.openfeign.client.config.geminiClient.readTimeout=10000

# ===============================
# 6. FILE UPLOADS (For Post Images)
# ===============================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
